name: Build & Release APK

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > eck-scanner.jks

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Get version info
        id: version
        run: |
          COUNT=$(git rev-list --count HEAD)
          MAJOR=1
          MINOR=$((COUNT / 10))
          PATCH=$((COUNT % 10))
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version_name=$VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$COUNT" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "apk_name=ECKScanner-v${VERSION}" >> $GITHUB_OUTPUT

      - name: Find APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "ECK Scanner ${{ steps.version.outputs.tag }}"
          files: ${{ steps.apk.outputs.path }}
          make_latest: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy APK to server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t ed25519 ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          SERVER_DIR=$(dirname ${{ secrets.SERVER_PATH }})
          VERSION=${{ steps.version.outputs.version_name }}
          scp -i ~/.ssh/deploy_key ${{ steps.apk.outputs.path }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${SERVER_DIR}/ECKScanner-v${VERSION}.apk
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "cd ${SERVER_DIR} && cp ECKScanner-v${VERSION}.apk ECKScanner.apk && cat > index.html << 'HTMLEOF'
<!DOCTYPE html>
<html lang=\"es\">
<head>
<meta charset=\"UTF-8\">
<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">
<title>ECK Scanner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#1A1A2E;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;color:#333;border-radius:16px;padding:32px;max-width:400px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
h1{font-size:24px;color:#1A1A2E;margin-bottom:4px}
.version{font-size:48px;font-weight:bold;color:#1B5E20;margin:16px 0}
.date{font-size:13px;color:#888;margin-bottom:24px}
.btn{display:block;background:#E94560;color:#fff;text-decoration:none;padding:16px;border-radius:8px;font-size:18px;font-weight:bold;margin-bottom:12px}
.btn:active{background:#c1374e}
.btn-alt{background:#1A1A2E}
.size{font-size:12px;color:#aaa;margin-top:8px}
</style>
</head>
<body>
<div class=\"card\">
<h1>ECK Scanner</h1>
<p style=\"color:#888;font-size:13px\">App para Zebra TC25</p>
<div class=\"version\">v${VERSION}</div>
<p class=\"date\">Actualizado: $(date +\"%d/%m/%Y %H:%M\")</p>
<a href=\"ECKScanner-v${VERSION}.apk\" class=\"btn\">DESCARGAR v${VERSION}</a>
<a href=\"https://github.com/CarlosTorrezC/eck-scanner/releases\" class=\"btn btn-alt\">Ver todas las versiones</a>
<p class=\"size\">~5 MB | Android 8+</p>
</div>
</body>
</html>
HTMLEOF"
