name: Build & Release APK

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > eck-scanner.jks

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Get version info
        id: version
        run: |
          COUNT=$(git rev-list --count HEAD)
          MAJOR=1
          MINOR=$((COUNT / 10))
          PATCH=$((COUNT % 10))
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version_name=$VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$COUNT" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "apk_name=ECKScanner-v${VERSION}" >> $GITHUB_OUTPUT

      - name: Find APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "ECK Scanner ${{ steps.version.outputs.tag }}"
          files: ${{ steps.apk.outputs.path }}
          make_latest: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy APK to server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t ed25519 ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          SERVER_DIR=$(dirname ${{ secrets.SERVER_PATH }})
          VERSION=${{ steps.version.outputs.version_name }}
          scp -i ~/.ssh/deploy_key ${{ steps.apk.outputs.path }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${SERVER_DIR}/ECKScanner-v${VERSION}.apk
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "cd ${SERVER_DIR} && cp ECKScanner-v${VERSION}.apk ECKScanner.apk"
          bash .github/download-page.sh ${VERSION}
          scp -i ~/.ssh/deploy_key index.html ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${SERVER_DIR}/index.html
